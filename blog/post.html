<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="DuJie Blog">
    <meta name="author" content="DuJie">
    <title>Blog - DuJie</title>
    <meta property="og:title" content="渡劫 - DuJie Blog">
    <meta property="og:description" content="活出自己的人生">
    <meta property="og:image" content="https://dujie-js.github.io/assets/img/myLogo.jpg">
    <meta property="og:url" content="https://dujie-js.github.io/blog/">
    <meta property="og:type" content="article">
    <meta property="og:locale" content="zh_CN">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/assets/css/onlinewebfonts.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/iconfont.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/blog.css">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="alternate" type="application/rss+xml" title="DuJie Blog RSS" href="/feed.xml">
    <script type="application/ld+json" id="json-ld-post">
    {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "DuJie Blog",
        "author": {
            "@type": "Person",
            "name": "DuJie"
        },
        "image": "https://dujie-js.github.io/assets/img/myLogo.jpg"
    }
    </script>
</head>
<body class="blog-body">

<span class="blog-mobile-menu-btn">
    <i class="social iconfont icon-list"></i>
</span>

<header class="blog-header">
    <div class="blog-header__inner">
        <a href="/" class="blog-header__title">渡劫</a>
        <nav class="blog-header__nav">
            <a href="/">首页</a>
            <a href="/blog/" class="active">博客</a>
            <a href="https://blog.csdn.net/qq_37771811?type=blog" target="_blank">CSDN</a>
            <a href="/resume/resume.pdf" target="_blank">简历</a>
            <a href="/about/">关于</a>
        </nav>
    </div>
</header>

<main class="blog-main blog-main--with-toc">
    <div class="blog-toc" id="post-toc"></div>
    <div class="blog-article-wrapper">
        <article id="post-content" class="blog-article">
            <div class="blog-loading">加载中...</div>
        </article>

        <!-- Comment system (utterances) -->
        <div id="comments-container" class="blog-comments"></div>
    </div>
</main>

<footer class="blog-footer">
    <p class="power">Powered By
        <a href="https://github.com/features/actions" target="_blank">GitHub Actions</a>
        &nbsp;·&nbsp; <a href="/feed.xml" target="_blank">RSS</a>
        <br/>
        <span id="busuanzi_container_site_pv">👁️ <span id="busuanzi_value_site_pv"></span> 次访问</span>
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="/assets/js/blog.js"></script>
<script>
    // Load utterances comment widget
    (function () {
        var container = document.getElementById('comments-container');
        if (!container) return;

        var script = document.createElement('script');
        script.src = 'https://utteranc.es/client.js';
        script.async = true;
        script.setAttribute('repo', 'dujie-js/dujie-js.github.io');
        script.setAttribute('issue-term', 'pathname');
        script.setAttribute('theme', 'github-dark');
        script.setAttribute('crossorigin', 'anonymous');
        container.appendChild(script);
    })();
</script>
<script>
    BlogNav.init();
    BlogPost.init();
</script>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

</body>
</html>
