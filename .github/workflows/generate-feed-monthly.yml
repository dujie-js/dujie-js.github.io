name: Generate RSS Feed and Sitemap (Monthly)

concurrency:
  group: generate-feed-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # Run on the 1st of every month at 02:57 UTC
    - cron: '57 2 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate feed.xml and sitemap.xml
        run: node assets/js/generate-rss-sitemap.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: monthly feed/sitemap update [skip ci]"
            git push
          fi
